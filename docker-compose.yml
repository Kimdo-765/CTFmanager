name: hextech_ctf_tool

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Lift the SDK's per-turn output cap. The model still has its
      # own hard ceiling (Sonnet/Opus ~64k), so the agent picks
      # whatever its model supports rather than getting truncated
      # at the SDK default. Override in .env if you want it lower.
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: ${CLAUDE_CODE_MAX_OUTPUT_TOKENS:-999999}
    volumes:
      - ./data:/data
      - ./modules:/app/modules:ro
      - ./web-ui:/app/web-ui:ro
      - ${HOST_CLAUDE_HOME:-${HOME}/.claude}:/root/.claude:ro
      # api needs the docker socket to kill sibling containers spawned by
      # workers when the user deletes a running job.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      HOST_DATA_DIR: ${HOST_DATA_DIR:-./data}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      # Tell the bundled `claude` CLI it is running in a sandbox so it allows
      # --dangerously-skip-permissions even though the container runs as root.
      IS_SANDBOX: "1"
      # Lift the SDK's per-turn output cap. The model's own ceiling
      # (Sonnet/Opus ~64k) becomes the effective limit. Override in
      # .env to throttle if needed.
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: ${CLAUDE_CODE_MAX_OUTPUT_TOKENS:-999999}
      # Trip-wire: kill investigation-loop runaway before the SDK
      # exhausts its conversation context. 0 disables.
      INVESTIGATION_BUDGET: ${INVESTIGATION_BUDGET:-60}
    volumes:
      - ./data:/data
      - ./modules:/app/modules:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the host's Claude Code config so the bundled `claude` CLI in the
      # worker uses your existing claude.ai OAuth token (no API key needed).
      # Run `claude login` once on the host to populate ~/.claude/.
      - ${HOST_CLAUDE_HOME:-${HOME}/.claude}:/root/.claude
    depends_on:
      - redis
    restart: unless-stopped

  # Built but not started by default. Worker spawns transient instances per job.
  decompiler:
    image: hextech_ctf_tool-decompiler
    build:
      context: .
      dockerfile: decompiler/Dockerfile
      args:
        GHIDRA_VERSION: ${GHIDRA_VERSION:-12.0.4}
        GHIDRA_BUILD_DATE: ${GHIDRA_BUILD_DATE:-20260303}
    profiles: ["tools"]

  forensic:
    image: hextech_ctf_tool-forensic
    build:
      context: .
      dockerfile: forensic/Dockerfile
    profiles: ["tools"]

  misc:
    image: hextech_ctf_tool-misc
    build:
      context: .
      dockerfile: misc/Dockerfile
    profiles: ["tools"]

  runner:
    image: hextech_ctf_tool-runner
    build:
      context: .
      dockerfile: runner/Dockerfile
    profiles: ["tools"]

  sage:
    image: sagemath/sagemath:latest
    profiles: ["tools-sage"]

volumes:
  redis-data:
