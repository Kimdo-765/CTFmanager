name: hextech_ctf_tool

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Lift the SDK's per-turn output cap. The model still has its
      # own hard ceiling (Sonnet/Opus ~64k), so the agent picks
      # whatever its model supports rather than getting truncated
      # at the SDK default. Override in .env if you want it lower.
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: ${CLAUDE_CODE_MAX_OUTPUT_TOKENS:-999999}
    volumes:
      - ./data:/data
      - ./modules:/app/modules:ro
      - ./web-ui:/app/web-ui:ro
      # rw (not ro) so /retry and /resume can copy the previous SDK
      # session's transcript jsonl into the new job's project-key
      # directory under ~/.claude/projects/. Without this the SDK
      # CLI transport searches only the new cwd's project key and
      # can't find the prior session, so fork_session silently fails.
      - ${HOST_CLAUDE_HOME:-${HOME}/.claude}:/root/.claude
      # api needs the docker socket to kill sibling containers spawned by
      # workers when the user deletes a running job.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    # Cap worker memory so a runaway heap-chal exploit loop or a
    # debugger subagent spawning concurrent ./prob + gdb instances
    # can't trigger the host OOM-killer (which kills the bundled
    # `claude` CLI as the largest process — surfaced as
    # `Command failed with exit code -9` and a lost run). With a
    # cgroup limit the OOM stays inside the container; the SDK
    # session ends cleanly with an error_kind we can classify.
    # Override via .env if you have a different RAM budget.
    #
    # Default raised 8g → 12g after job 011a6d486d53: main session
    # accumulated ~3.6M cache_read tokens then spawned debugger as
    # a fresh SDK child process. Two SDK instances + main brute-force
    # output context squeezed past 8g cap right at the debugger spawn.
    # 12g gives ~50% headroom while still containing pathological loops.
    mem_limit: ${WORKER_MEM_LIMIT:-12g}
    memswap_limit: ${WORKER_MEM_LIMIT:-12g}
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      HOST_DATA_DIR: ${HOST_DATA_DIR:-./data}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-3}
      # Tell the bundled `claude` CLI it is running in a sandbox so it allows
      # --dangerously-skip-permissions even though the container runs as root.
      IS_SANDBOX: "1"
      # Lift the SDK's per-turn output cap. The model's own ceiling
      # (Sonnet/Opus ~64k) becomes the effective limit. Override in
      # .env to throttle if needed.
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: ${CLAUDE_CODE_MAX_OUTPUT_TOKENS:-999999}
      # Trip-wire: ABORT the main session when the agent has burned this
      # many tool calls without producing exploit.py / solver.py. Default
      # 100 — empirically jobs 1d00be30d4e9 (169 turns), a914ca943ed2
      # (168 turns), 9d58fe152fba (171 turns) all OOM'd well before the
      # cap matters. Set to 0 to disable, or higher if you want more
      # rope. A soft eject ("draft now, refine later") fires at 80% of
      # this value; the hard abort fires at 100%.
      INVESTIGATION_BUDGET: ${INVESTIGATION_BUDGET:-100}
      # Max postjudge-driven auto retries within a single job (in
      # addition to the first attempt). When auto_run is on and the
      # sandbox returns a non-success verdict with an actionable
      # retry_hint, the orchestrator injects that hint as a new user
      # turn back to the same main SDK session, preserving cache.
      # Semantics:
      #   0                    → disabled (legacy fire-and-forget)
      #   N (positive int)     → cap at exactly N retries
      #   -1 / inf / unlimited → no cap; loop continues until success,
      #     empty retry_hint, agent error, BUDGET_ABORT, user Stop, or
      #     soft/hard timeout
      # Default: -1 (unlimited). Override via .env if you want a cap.
      AUTO_RETRY_MAX: ${AUTO_RETRY_MAX:--1}
      # Context-compaction guard. When the accumulated
      # `cache_read_input_tokens` for the main session crosses
      # CONTEXT_COMPACTION_THRESHOLD (SOFT), the orchestrator injects a
      # "finalize now, no subagent spawns" user-turn. When it crosses
      # CONTEXT_COMPACTION_HARD_CEILING, the main session is aborted
      # cleanly so the auto-retry loop forks a fresh session before the
      # SDK CLI gets OOM-killed (the documented failure mode of jobs
      # 011a6d486d53 / 7c4a6a4c7581). Set SOFT=0 to disable both.
      CONTEXT_COMPACTION_THRESHOLD: ${CONTEXT_COMPACTION_THRESHOLD:-8000000}
      CONTEXT_COMPACTION_HARD_CEILING: ${CONTEXT_COMPACTION_HARD_CEILING:-14000000}
    volumes:
      - ./data:/data
      - ./modules:/app/modules:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the host's Claude Code config so the bundled `claude` CLI in the
      # worker uses your existing claude.ai OAuth token (no API key needed).
      # Run `claude login` once on the host to populate ~/.claude/.
      - ${HOST_CLAUDE_HOME:-${HOME}/.claude}:/root/.claude
    depends_on:
      - redis
    restart: unless-stopped

  # Built but not started by default. Worker spawns transient instances per job.
  decompiler:
    image: hextech_ctf_tool-decompiler
    build:
      context: .
      dockerfile: decompiler/Dockerfile
      args:
        GHIDRA_VERSION: ${GHIDRA_VERSION:-12.0.4}
        GHIDRA_BUILD_DATE: ${GHIDRA_BUILD_DATE:-20260303}
    profiles: ["tools"]

  forensic:
    image: hextech_ctf_tool-forensic
    build:
      context: .
      dockerfile: forensic/Dockerfile
    profiles: ["tools"]

  misc:
    image: hextech_ctf_tool-misc
    build:
      context: .
      dockerfile: misc/Dockerfile
    profiles: ["tools"]

  runner:
    image: hextech_ctf_tool-runner
    build:
      context: .
      dockerfile: runner/Dockerfile
    profiles: ["tools"]

  sage:
    image: sagemath/sagemath:latest
    profiles: ["tools-sage"]

volumes:
  redis-data:
